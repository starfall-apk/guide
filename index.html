<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Богдан Простаткин | Web Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-gradient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header class="glass-card">
            <div class="lottie-container">
                <lottie-player 
                    src="black_sakura.json"  
                    background="transparent"  
                    speed="1"  
                    style="width: 180px; height: 180px;"  
                    loop  
                    autoplay>
                </lottie-player>
            </div>
            
            <h1 class="name">Богдан Простаткин</h1>
            <p class="surname-patronymic">Дмитриевич</p>
            <div class="badge">Professional Web Developer</div>
            
            <p class="description">
                Создаю цифровые интерфейсы с акцентом на эстетику Apple и функциональность Telegram.
            </p>

            <div class="button-group">
                <a href="#" class="btn primary">Написать мне</a>
                <a href="#" class="btn secondary">Портфолио</a>
            </div>
        </header>

        <section class="skills">
            <div class="mini-glass">Frontend</div>
            <div class="mini-glass">UI/UX Design</div>
            <div class="mini-glass">Telegram Bots</div>
        </section>
    </div>

</body>
</html>
