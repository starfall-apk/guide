<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>starfall | Cat Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
    <style>
        :root {
            --bg-dark: #050505;
            --text-primary: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Анимированный фон как на главной */
        .bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; filter: blur(100px); transform: translateZ(0);
        }
        .glow-sphere {
            position: absolute; border-radius: 50%; opacity: 0.15;
            animation: floating 15s infinite alternate ease-in-out;
        }
        .sphere-1 { width: 60vw; height: 60vw; background: #ff0080; top: -10%; left: -10%; }
        .sphere-2 { width: 50vw; height: 50vw; background: #7928ca; bottom: -5%; right: -5%; }

        @keyframes floating {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(30px, 50px, 0); }
        }

        .container {
            width: 92%;
            max-width: 800px;
            padding: 40px 0;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Шапка с кнопкой назад */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .back-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        /* Сетка галереи */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .photo-card {
            position: relative;
            aspect-ratio: 1 / 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .photo-card:hover {
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.2);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        /* Текст при клике/наведении */
        .photo-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .photo-card:hover .photo-info { opacity: 1; }

        .footer {
            text-align: center;
            margin-top: 50px;
            font-size: 10px;
            opacity: 0.4;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="bg-wrapper">
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>
</div>

<div class="container">
    <div class="header">
        <a href="index.html" class="back-btn">
            <span class="material-symbols-rounded">arrow_back_ios_new</span>
        </a>
        <h1 style="font-weight: 800; font-size: 24px;">Cat Archives</h1>
        <div style="width: 48px;"></div> </div>

    <div class="gallery-grid">
        <div class="photo-card">
            <img src="cat1.jpg" alt="Моя кошка">
            <div class="photo-info">Утренний сон</div>
        </div>
        
        </div>

    <div class="footer">CREATIVE SPACE BY STARFALL</div>
</div>

</body>
</html>
