<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>starfall | Optimized</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie_light.min.js"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --btn-glow: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none; touch-action: pan-y;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* --- GPU ОПТИМИЗИРОВАННЫЙ ФОН --- */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(100px);
            transform: translateZ(0);
            will-change: transform;
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            opacity: 0.25;
            animation: floating 15s infinite alternate ease-in-out;
            will-change: transform;
        }
        .sphere-1 { width: 70vw; height: 70vw; background: #6a11cb; top: -15%; left: -10%; }
        .sphere-2 { width: 60vw; height: 60vw; background: #2575fc; bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes floating {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            100% { transform: translate3d(40px, 60px, 0) scale(1.05); }
        }

        .main-container {
            width: 92%;
            max-width: 420px;
            padding: 40px 0;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 24px;
            margin-bottom: 20px;
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: translateZ(0);
            will-change: transform;
        }

        .glass-card:active { transform: scale(0.97) translateZ(0); }

        .profile-header { text-align: center; }

        #lottie-helmet {
            width: 120px; height: 120px;
            margin: -20px auto 10px;
        }

        .nick { font-size: 24px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }

        .title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .sakura-mini { width: 32px; height: 32px; }

        h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }

        .action-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            margin-bottom: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateZ(0);
        }

        .action-item:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 25px var(--btn-glow);
        }

        .icon-box {
            width: 45px; height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .cat-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            text-align: center;
        }

        #lottie-cat {
            width: 160px; height: 160px;
            margin: -20px auto -10px;
        }

        .gift-btn {
            background: #ffffff;
            color: #000;
            border-radius: 26px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 20px 50px rgba(255, 255, 255, 0.15);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: translateZ(0);
        }

        #lottie-gift { width: 90px; height: 90px; margin-top: -15px; }

        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="bg-wrapper">
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>
</div>

<div class="main-container" id="content">
    
    <div class="glass-card profile-header">
        <div id="lottie-helmet"></div>
        <h1 class="nick">starfall-apk</h1>
        <p style="font-size: 13px; color: var(--text-secondary);">Software Architect & Creator</p>
    </div>

    <div class="glass-card">
        <div class="title-row">
            <div class="sakura-mini lottie-sakura" data-path="black_sakura.json"></div>
            <h2>Связь</h2>
        </div>
        <a href="https://t.me/join_CBO" class="action-item">
            <div class="icon-box"><span class="material-symbols-rounded">rocket_launch</span></div>
            <span>Adapter: Основной канал</span>
        </a>
    </div>

    <div class="glass-card">
        <div class="title-row">
            <div class="sakura-mini lottie-sakura" data-path="black_sakura.json"></div>
            <h2>Проекты</h2>
        </div>
        <a href="#" class="action-item">
            <div class="icon-box"><span class="material-symbols-rounded">smart_toy</span></div>
            <span>Смешные боты</span>
        </a>
        <a href="#" class="action-item">
            <div class="icon-box"><span class="material-symbols-rounded">architecture</span></div>
            <span>Polarity Toolkit</span>
        </a>
    </div>

    <div class="glass-card cat-card" onclick="window.location.href='cat-gallery.html'">
        <div id="lottie-cat"></div>
        <h2 style="margin-bottom: 10px;">Моя Кошка</h2>
        <div class="action-item" style="justify-content: center; background: rgba(255,255,255,0.05); margin-bottom: 0;">
            <span>Смотреть фотографии</span>
        </div>
    </div>

    <a href="https://t.me/wf9ll" class="gift-btn">
        <div id="lottie-gift"></div>
        <span>ПОДДЕРЖАТЬ АВТОРА</span>
    </a>

    <div class="footer">Ecosystem by starfall</div>
</div>

<script>
    // Массив для хранения всех инстансов анимаций
    const animations = [];

    // Настройка Observer: останавливает анимацию, если её не видно
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const anim = animations.find(a => a.wrapper === entry.target);
            if (anim) {
                entry.isIntersecting ? anim.play() : anim.pause();
            }
        });
    }, { threshold: 0.1 });

    // Функция создания анимации с задержкой
    function initAnim(id, path, delay = 0) {
        setTimeout(() => {
            const container = typeof id === 'string' ? document.getElementById(id) : id;
            if (!container) return;

            const anim = lottie.loadAnimation({
                container: container,
                renderer: 'svg',
                loop: true,
                autoplay: false, // Начинаем на паузе, Observer включит
                path: path,
                rendererSettings: {
                    preserveAspectRatio: 'xMidYMid slice',
                    hideOnTransparent: true,
                    progressiveLoad: true
                }
            });

            // Сохраняем обертку для поиска в Observer
            anim.wrapper = container;
            animations.push(anim);
            observer.observe(container);
        }, delay);
    }

    // Запуск анимаций с шахматной задержкой (по 150мс между группами)
    // 1. Шлем (сразу)
    initAnim('lottie-helmet', 'gold_helmet.json', 0);
    
    // 2. Сакуры (через 150мс)
    document.querySelectorAll('.lottie-sakura').forEach((el, i) => {
        initAnim(el, el.getAttribute('data-path'), 150);
    });

    // 3. Кошка (через 300мс)
    initAnim('lottie-cat', 'cat.json', 300);

    // 4. Подарок (через 450мс)
    initAnim('lottie-gift', 'gift.json', 450);

    // Блокировка зума
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
</script>

</body>
</html>
