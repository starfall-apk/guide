<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Богдан Простаткин | Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie_light.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-wrapper">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>

    <div class="main-container">
        <header class="glass-profile">
            <div id="lottie-sticker" class="lottie-box"></div>
            
            <h1 class="title">Богдан Простаткин</h1>
            <p class="subtitle">Дмитриевич</p>
            
            <div class="status-pill">Fullstack Developer</div>
            
            <p class="bio">
                Специализируюсь на создании современных интерфейсов и автоматизации систем. 
                Эстетика iOS, мощь Python и чистота кода.
            </p>

            <div class="actions">
                <a href="https://t.me/ТВОЙ_ЛОГИН" target="_blank" class="btn btn-filled">Написать мне</a>
                <a href="portfolio.html" class="btn btn-outline">Портфолио</a>
            </div>
        </header>
    </div>

    <script>
        lottie.loadAnimation({
            container: document.getElementById('lottie-sticker'), // ID контейнера
            renderer: 'svg', // Рендерим в SVG для четкости и скорости
            loop: true,
            autoplay: true,
            path: 'black_sakura.json' // Путь к файлу
        });
    </script>

</body>
</html>
