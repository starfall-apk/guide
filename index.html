<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение посмотреть игру Theo Town</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        
        .container {
            max-width: 800px;
            animation: fadeIn 1s ease-out;
        }
        
        .message-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            background: linear-gradient(90deg, #4fc3f7, #29b6f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .message {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #e3f2fd;
        }
        
        .game-link {
            display: inline-block;
            background: linear-gradient(90deg, #00e676, #00c853);
            color: white;
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 20px 50px;
            border-radius: 50px;
            margin: 30px 0;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 200, 83, 0.4);
            animation: pulse 2s infinite;
        }
        
        .game-link:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 200, 83, 0.6);
        }
        
        .game-link:active {
            transform: translateY(-2px);
        }
        
        .game-id {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 1.2rem;
            margin-top: 20px;
            display: inline-block;
        }
        
        .hint {
            font-size: 1.1rem;
            color: #bbdefb;
            margin-top: 30px;
            opacity: 0.9;
        }
        
        .countdown {
            font-size: 1.3rem;
            margin-top: 20px;
            color: #ffeb3b;
            font-weight: bold;
        }
        
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 10px 25px rgba(0, 200, 83, 0.4); }
            50% { box-shadow: 0 10px 30px rgba(0, 200, 83, 0.7); }
            100% { box-shadow: 0 10px 25px rgba(0, 200, 83, 0.4); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .message { font-size: 1.2rem; }
            .game-link { font-size: 1.4rem; padding: 15px 30px; }
            .message-box { padding: 30px 20px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="message-box">
            <div class="icon">
                <i class="fas fa-gamepad"></i>
            </div>
            
            <h1>Привет!</h1>
            
            <div class="message">
                Посмотри игру, которую я недавно нашел:<br>
                <strong>Theo Town</strong> - увлекательный градостроительный симулятор!
            </div>
            
            <a href="https://theo.town/share?id=6ODNY6Ob" class="game-link" id="gameLink">
                <i class="fas fa-play-circle"></i> Играть в Theo Town
            </a>
            
            <div class="game-id">
                ID игры: 6ODNY6Ob
            </div>
            
            <div class="hint">
                Нажмите на кнопку выше, чтобы открыть игру в новой вкладке
            </div>
            
            <div class="countdown" id="countdown">
                Автоперенаправление через: <span id="timer">10</span> сек
            </div>
        </div>
    </div>

    <script>
        // Автоматическое перенаправление через 10 секунд
        let seconds = 10;
        const timerElement = document.getElementById('timer');
        const countdownElement = document.getElementById('countdown');
        const gameLink = document.getElementById('gameLink');
        
        function updateTimer() {
            timerElement.textContent = seconds;
            
            if (seconds <= 0) {
                // Перенаправляем на игру
                window.location.href = gameLink.href;
            } else {
                seconds--;
                setTimeout(updateTimer, 1000);
            }
        }
        
        // Запускаем таймер
        setTimeout(updateTimer, 1000);
        
        // При клике на ссылку отменяем автоперенаправление
        gameLink.addEventListener('click', function(e) {
            // Открываем в новой вкладке
            e.preventDefault();
            window.open(this.href, '_blank');
            
            // Останавливаем таймер и меняем текст
            seconds = 0;
            countdownElement.innerHTML = 'Игра открывается в новой вкладке!';
            countdownElement.style.color = '#4caf50';
        });
        
        // Также перенаправляем при клике по всей странице (кроме самой ссылки)
        document.body.addEventListener('click', function(e) {
            if (e.target.id !== 'gameLink' && !e.target.closest('#gameLink')) {
                gameLink.click();
            }
        });
        
        // Добавляем эффект при наведении на всю страницу
        document.body.style.cursor = 'pointer';
    </script>
</body>
</html>
