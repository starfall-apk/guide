<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>starf9ll | Guide</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie_light.min.js"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --accent-pink: #ff7eb3;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --btn-glow: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: pan-y;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* --- ФОН --- */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(80px);
            transform: translateZ(0);
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            opacity: 0.2;
            animation: floating 20s infinite alternate ease-in-out;
        }
        .sphere-1 { width: 60vw; height: 60vw; background: #501e9c; top: -10%; left: -10%; }
        .sphere-2 { width: 50vw; height: 50vw; background: #1e5a9c; bottom: -5%; right: -5%; }

        @keyframes floating {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 40px); }
        }

        /* --- КОНТЕЙНЕР --- */
        .main-container {
            width: 90%;
            max-width: 420px;
            padding: 30px 0;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 16px;
            position: relative;
        }

        /* --- САКУРА НА УРОВНЕ ТЕКСТА --- */
        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .sakura-inline {
            width: 28px;
            height: 28px;
            display: inline-block;
        }

        h2 { font-size: 17px; font-weight: 700; }

        /* --- ССЫЛКИ И ПРОЕКТЫ --- */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 14px 18px;
            border-radius: 18px;
            text-decoration: none;
            color: inherit;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .nav-item:hover { background: rgba(255,255,255,0.07); }
        .nav-item span { font-size: 14px; font-weight: 600; }
        
        .icon-box {
            width: 38px; height: 38px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- КНОПКА ПОДАРКА --- */
        .gift-link {
            text-decoration: none;
            display: block;
            margin-top: 25px;
        }

        .gift-btn {
            background: #ffffff;
            color: #000;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 20px 40px rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        #lottie-gift {
            width: 80px; /* Увеличен */
            height: 80px;
            margin-top: -10px;
        }

        .gift-btn span {
            letter-spacing: -0.5px;
        }

        /* --- ПРОФИЛЬ --- */
        .profile-header { text-align: center; padding: 10px 0; }
        .avatar {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #303030, #101010);
            border-radius: 22px;
            margin: 0 auto 15px;
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
    </style>
</head>
<body>

<div class="bg-wrapper">
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>
</div>

<div class="main-container">
    
    <div class="glass-card">
        <div class="profile-header">
            <div class="avatar"></div>
            <div class="title-wrapper" style="justify-content: center;">
                <h1 style="font-size: 20px; font-weight: 800;">starfall-apk</h1>
                <div class="sakura-inline lottie-sakura"></div>
            </div>
            <p style="font-size: 13px; color: var(--text-secondary);">Independent Developer & Designer</p>
        </div>
    </div>

    <div class="glass-card">
        <div class="title-wrapper">
            <div class="sakura-inline lottie-sakura"></div>
            <h2>Мой канал</h2>
        </div>
        <a href="https://t.me/your_channel" class="nav-item">
            <div class="icon-box"><span class="material-symbols-rounded">campaign</span></div>
            <span>Adapter</span>
        </a>
    </div>

    <div class="glass-card">
        <div class="title-wrapper">
            <div class="sakura-inline lottie-sakura"></div>
            <h2>Проекты</h2>
        </div>
        
        <a href="#" class="nav-item">
            <div class="icon-box"><span class="material-symbols-rounded">vpn_lock</span></div>
            <span>Смешные боты</span>
        </a>

        <a href="#" class="nav-item">
            <div class="icon-box"><span class="material-symbols-rounded">auto_awesome</span></div>
            <span>Polarity Toolkit</span>
        </a>
    </div>

    <a href="https://t.me/wf9ll" class="gift-link">
        <div class="gift-btn">
            <div id="lottie-gift"></div>
            <span>ПОДДЕРЖАТЬ ПРОЕКТ</span>
        </div>
    </a>

</div>

<script>
    // Оптимизированная инициализация Сакуры (маленькие, в ряд с текстом)
    document.querySelectorAll('.lottie-sakura').forEach(el => {
        lottie.loadAnimation({
            container: el,
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: 'black_sakura.json'
        });
    });

    // Увеличенный подарок
    lottie.loadAnimation({
        container: document.getElementById('lottie-gift'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: 'gift.json'
    });

    // Блокировка зума
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
</script>

</body>
</html>
